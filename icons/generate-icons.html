<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>生成 Chrome 扩展图标</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px; background: #f5f5f5; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { margin-top: 0; font-size: 20px; }
    .drop-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 40px; text-align: center; color: #666; cursor: pointer; transition: border-color 0.2s; }
    .drop-zone:hover, .drop-zone.dragover { border-color: #4285f4; color: #4285f4; }
    .sizes { margin-top: 24px; display: flex; gap: 16px; flex-wrap: wrap; }
    .size-card { flex: 1; min-width: 120px; border: 1px solid #eee; border-radius: 8px; padding: 16px; text-align: center; }
    .size-card canvas { display: block; margin: 0 auto 12px; image-rendering: pixelated; border: 1px solid #eee; border-radius: 4px; }
    .size-card .label { font-size: 14px; color: #666; margin-bottom: 8px; }
    .size-card a { display: inline-block; padding: 6px 16px; background: #4285f4; color: #fff; text-decoration: none; border-radius: 4px; font-size: 13px; }
    .size-card a:hover { background: #3367d6; }
    .hidden { display: none; }
    #status { margin-top: 16px; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chrome 扩展图标生成器</h1>
    <p>将 <code>icon.svg</code> 或 <code>icon.png</code> 拖放到下方，或点击选择文件，自动生成 16x16、48x48、128x128 的 PNG 图标。</p>

    <div class="drop-zone" id="dropZone">
      点击选择或拖拽 SVG / PNG 文件到此处
      <input type="file" id="fileInput" accept=".svg,.png" style="display:none">
    </div>

    <div id="result" class="hidden">
      <div class="sizes">
        <div class="size-card">
          <div class="label">icon16.png</div>
          <canvas id="c16" width="16" height="16"></canvas>
          <a id="d16" href="#" download="icon16.png">下载</a>
        </div>
        <div class="size-card">
          <div class="label">icon48.png</div>
          <canvas id="c48" width="48" height="48"></canvas>
          <a id="d48" href="#" download="icon48.png">下载</a>
        </div>
        <div class="size-card">
          <div class="label">icon128.png</div>
          <canvas id="c128" width="128" height="128"></canvas>
          <a id="d128" href="#" download="icon128.png">下载</a>
        </div>
      </div>
      <p id="status"></p>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const result = document.getElementById('result');
    const status = document.getElementById('status');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function drawToCanvases(img) {
      [16, 48, 128].forEach(size => {
        const canvas = document.getElementById('c' + size);
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
        const pngUrl = canvas.toDataURL('image/png');
        const link = document.getElementById('d' + size);
        link.href = pngUrl;
      });
      result.classList.remove('hidden');
      status.textContent = '生成完成！点击上方按钮下载，将三个 PNG 文件放入 icons 文件夹中。';
    }

    function generateIcons(svgText) {
      const svgBlob = new Blob([svgText], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(svgBlob);
      const img = new Image();
      img.onload = () => {
        drawToCanvases(img);
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    function handleFile(file) {
      if (file.name.endsWith('.svg')) {
        const reader = new FileReader();
        reader.onload = (e) => generateIcons(e.target.result);
        reader.readAsText(file);
      } else if (file.name.endsWith('.png')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => drawToCanvases(img);
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      } else {
        alert('请选择 SVG 或 PNG 文件');
      }
    }

    // 自动加载同目录下的 icon.svg 或 icon.png
    (async () => {
      try {
        const r = await fetch('icon.svg');
        if (r.ok) {
          const text = await r.text();
          dropZone.textContent = '已自动加载 icon.svg，正在生成...';
          generateIcons(text);
          return;
        }
      } catch (e) {}

      try {
        const r = await fetch('icon.png');
        if (r.ok) {
          const blob = await r.blob();
          dropZone.textContent = '已自动加载 icon.png，正在生成...';
          const url = URL.createObjectURL(blob);
          const img = new Image();
          img.onload = () => {
            drawToCanvases(img);
            URL.revokeObjectURL(url);
          };
          img.src = url;
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
